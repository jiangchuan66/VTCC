<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>VTCC 赛事</title>
  <style>
    :root{--bg:#f7f8fa;--surface:#fff;--fg:#1d2129;--muted:#4e5969;--subtle:#86909c;--border:#e5e6eb;--accent:#ff4655;--accent-soft:#fff0f1;--upcoming:#3370ff;--upcoming-soft:#eef4ff;--font-display:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--font-body:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--font-mono:"SFMono-Regular",Consolas,monospace;--r-sm:8px;--r-md:12px;--space:16px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:var(--font-body);font-size:14px;-webkit-font-smoothing:antialiased}button{font:inherit;cursor:pointer}button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}.app{width:100%;min-height:100vh;padding:0 16px 32px;overflow-x:hidden}.statusbar{height:24px;display:flex;align-items:end;justify-content:space-between;padding:0 4px 2px;font-size:11px;font-weight:650}.status-icons{letter-spacing:1px}.top{padding:18px 0 4px}.top h1{font:800 28px/1.1 var(--font-display);letter-spacing:-.03em;margin:0}.top p{font-size:13px;color:var(--subtle);margin:7px 0 0}.notice{font-size:10px;color:var(--subtle);margin:5px 0 0}.filters{margin-top:20px}.filter-block+.filter-block{margin-top:16px}.filter-label{display:block;font-size:12px;color:var(--muted);font-weight:650;margin-bottom:9px}.chip-rail{display:flex;gap:8px;margin:0 -16px;padding:0 16px 3px;overflow-x:auto;scrollbar-width:none}.chip-rail::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;height:34px;padding:0 14px;border:0;border-radius:999px;background:var(--surface);color:var(--fg);box-shadow:inset 0 0 0 1px var(--border);font-size:13px;transition:background .15s,color .15s,transform .08s}.chip:active{transform:scale(.97)}.chip.active{background:var(--accent);color:var(--surface);box-shadow:none;font-weight:650}.summary{display:flex;align-items:center;justify-content:space-between;margin-top:22px;height:28px}.summary h2{font-size:18px;margin:0;font-weight:750}.count{font:11px var(--font-mono);color:var(--subtle)}.group{margin-top:16px}.group-head{display:flex;align-items:center;gap:8px;margin-bottom:9px}.group-head h3{font-size:13px;margin:0;font-weight:700}.group-count{font:10px var(--font-mono);color:var(--subtle)}.dot{width:7px;height:7px;border-radius:50%;background:var(--subtle)}.dot.live{background:var(--accent)}.dot.upcoming{background:var(--upcoming)}.cards{display:grid;gap:10px}.event-card{width:100%;border:1px solid var(--border);border-radius:12px;background:var(--surface);padding:13px 12px;box-shadow:0 2px 8px rgba(29,33,41,.035);display:grid;grid-template-columns:46px 1fr 20px;gap:11px;align-items:center;text-align:left;color:var(--fg);transition:transform .15s,border-color .15s}.event-card:active{transform:scale(.99)}.event-logo{width:46px;height:46px;border-radius:10px;background:var(--bg);display:grid;place-items:center;font-size:13px;font-weight:800;letter-spacing:-.02em}.event-logo.global{background:var(--fg);color:var(--surface)}.event-logo.cn{background:var(--accent-soft);color:var(--accent)}.event-logo.pacific{background:color-mix(in oklch,var(--upcoming-soft) 80%,var(--surface));color:var(--upcoming)}.event-logo.emea{background:color-mix(in oklch,var(--border) 45%,var(--surface));color:var(--fg)}.event-logo.americas{background:color-mix(in oklch,var(--accent-soft) 45%,var(--surface));color:color-mix(in oklch,var(--accent) 65%,var(--fg))}.event-main{min-width:0}.title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.event-name{font-size:15px;font-weight:700;line-height:1.35;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.abbr{font:10px var(--font-mono);color:var(--subtle);margin-left:5px}.status{flex:0 0 auto;padding:3px 7px;border-radius:6px;font-size:10px;line-height:1.4}.status.live{background:var(--accent-soft);color:var(--accent);font-weight:650}.status.upcoming{background:var(--upcoming-soft);color:var(--upcoming);font-weight:650}.status.ended{background:var(--bg);color:var(--subtle)}.meta{display:flex;align-items:center;gap:7px;margin-top:7px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden}.meta span{overflow:hidden;text-overflow:ellipsis}.meta .sep{width:2px;height:2px;border-radius:50%;background:var(--border);flex:0 0 auto}.submeta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:5px;font-size:11px;color:var(--subtle)}.arrow{color:var(--subtle);display:grid;place-items:center}.arrow svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.state-box{min-height:400px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-top:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px}.state-icon{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;color:var(--subtle);background:var(--bg);margin-bottom:13px}.state-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}.state-box h3{font-size:16px;margin:0}.state-box p{font-size:12px;color:var(--subtle);margin:7px 0 0;line-height:1.55;max-width:22em}.state-action{height:40px;border:1px solid var(--border);background:var(--surface);border-radius:9px;padding:0 22px;margin-top:16px;font-weight:650;color:var(--fg)}.skeletons{width:100%;display:grid;gap:10px}.skeleton-card{height:92px;border-radius:12px;background:linear-gradient(90deg,var(--border) 25%,var(--surface) 45%,var(--border) 65%);background-size:220% 100%;animation:load 1.35s infinite}.refresh{position:fixed;top:12px;left:50%;transform:translate(-50%,-50px);z-index:20;height:34px;padding:0 14px;border-radius:999px;background:var(--fg);color:var(--surface);display:flex;align-items:center;gap:7px;font-size:11px;transition:transform .2s}.refresh.show{transform:translate(-50%,0)}.spinner{width:12px;height:12px;border:2px solid color-mix(in oklch,var(--surface) 35%,transparent);border-top-color:var(--surface);border-radius:50%;animation:spin .8s linear infinite}.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,14px);background:var(--fg);color:var(--surface);border-radius:8px;padding:9px 14px;font-size:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}@keyframes load{to{background-position:-220% 0}}@keyframes spin{to{transform:rotate(360deg)}}@media(min-width:600px){.app{max-width:430px;margin:auto}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
  <style>
    /* 390×844 · iPhone 13 · 微信原生小程序安全区适配 */
    :root { --canvas-width: 390px; --safe-top: 47px; --safe-bottom: 34px; --native-tabbar-height: 49px; }
    html, body { width: 100%; min-height: 100%; }
    body { max-width: var(--canvas-width); margin-inline: auto; }
    .app {
      width: 100%;
      max-width: var(--canvas-width);
      min-height: 100svh;
      margin-inline: auto;
      padding: 0 16px calc(var(--native-tabbar-height) + var(--safe-bottom) + 16px);
    }
    .statusbar { height: var(--safe-top); padding: 0 4px 8px; }
    .top { padding: 10px 0 4px; }
    .refresh { top: calc(var(--safe-top) + 8px); }
    .toast { bottom: calc(var(--native-tabbar-height) + var(--safe-bottom) + 14px); }
    @supports (padding: env(safe-area-inset-bottom)) {
      .app { padding-bottom: calc(var(--native-tabbar-height) + max(var(--safe-bottom), env(safe-area-inset-bottom)) + 16px); }
    }
  </style>
</head>
<body>
  <div class="refresh" id="refreshIndicator"><span class="spinner"></span>正在刷新赛事</div>
  <div class="app" data-od-id="tournaments-page">
    <div class="statusbar" data-od-id="status-bar"><span>9:41</span><span class="status-icons">▮▮▮ ))) ▰</span></div>
    <header class="top" data-od-id="tournaments-header"><h1 data-od-id="tournaments-title">赛事</h1><p>查看全球 VCT 赛事</p><div class="notice">示例数据 · 日期参考 2026 官方赛季安排</div></header>
    <section class="filters" data-od-id="tournament-filters">
      <div class="filter-block"><span class="filter-label">赛区</span><div class="chip-rail" id="regionFilters" aria-label="赛区筛选"><button class="chip active" data-value="全部">全部</button><button class="chip" data-value="国际">国际</button><button class="chip" data-value="中国">中国</button><button class="chip" data-value="太平洋">太平洋</button><button class="chip" data-value="EMEA">EMEA</button><button class="chip" data-value="美洲">美洲</button></div></div>
      <div class="filter-block"><span class="filter-label">状态</span><div class="chip-rail" id="statusFilters" aria-label="状态筛选"><button class="chip active" data-value="全部">全部</button><button class="chip" data-value="进行中">进行中</button><button class="chip" data-value="即将开始">即将开始</button><button class="chip" data-value="已结束">已结束</button></div></div>
    </section>
    <main data-od-id="tournaments-content"><div class="summary"><h2>全部赛事</h2><span class="count" id="resultCount">—</span></div><div id="listRoot"></div></main>
  </div>
  <div class="toast" id="toast">已更新</div>
  <script>
    const DATA=[
      {id:'cn-s2',name:'VCT CN 第二赛段',abbr:'CN S2',region:'中国',stage:'常规赛',range:'6月30日–9月6日',status:'进行中',teams:12,logo:'CN',logoClass:'cn'},
      {id:'emea-s2',name:'VCT EMEA 第二赛段',abbr:'EMEA S2',region:'EMEA',stage:'小组赛',range:'7月15日–8月30日',status:'即将开始',teams:16,logo:'EM',logoClass:'emea'},
      {id:'pacific-s2',name:'VCT 太平洋第二赛段',abbr:'PAC S2',region:'太平洋',stage:'小组赛',range:'7月16日–9月6日',status:'即将开始',teams:16,logo:'PAC',logoClass:'pacific'},
      {id:'americas-s2',name:'VCT 美洲第二赛段',abbr:'AME S2',region:'美洲',stage:'常规赛',range:'7月16日–9月6日',status:'即将开始',teams:12,logo:'AM',logoClass:'americas'},
      {id:'champions-shanghai',name:'无畏契约全球冠军赛·上海',abbr:'CH 26',region:'国际',stage:'全球冠军赛',range:'9月24日–10月18日',status:'即将开始',teams:16,logo:'VCT',logoClass:'global'},
      {id:'masters-london',name:'无畏契约大师赛·伦敦',abbr:'ML 26',region:'国际',stage:'季后赛',range:'6月6日–6月21日',status:'已结束',teams:12,logo:'M',logoClass:'global'},
      {id:'masters-santiago',name:'无畏契约大师赛·圣地亚哥',abbr:'MS 26',region:'国际',stage:'总决赛',range:'2月28日–3月16日',status:'已结束',teams:12,logo:'M',logoClass:'global'}
    ];
    const order=['进行中','即将开始','已结束'];let region=localStorage.getItem('vtcc-tournaments-region')||'全部';let status=localStorage.getItem('vtcc-tournaments-status')||'全部';const root=document.getElementById('listRoot');
    function statusClass(s){return s==='进行中'?'live':s==='即将开始'?'upcoming':'ended'}
    function card(item){return `<button class="event-card" data-od-id="tournament-${item.id}" data-id="${item.id}"><span class="event-logo ${item.logoClass}">${item.logo}</span><span class="event-main"><span class="title-row"><span class="event-name">${item.name}<span class="abbr">${item.abbr}</span></span><span class="status ${statusClass(item.status)}">${item.status}</span></span><span class="meta"><span>${item.region}</span><i class="sep"></i><span>${item.stage}</span><i class="sep"></i><span>${item.range}</span></span><span class="submeta"><span>${item.teams} 支参赛战队</span><span>查看赛事</span></span></span><span class="arrow"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></span></button>`}
    function normal(){const filtered=DATA.filter(x=>(region==='全部'||x.region===region)&&(status==='全部'||x.status===status));document.getElementById('resultCount').textContent=`${filtered.length} 项`;document.querySelector('.summary h2').textContent=region==='全部'&&status==='全部'?'全部赛事':'筛选结果';if(!filtered.length){empty();return}root.innerHTML=order.map(s=>{const items=filtered.filter(x=>x.status===s);if(!items.length)return'';return `<section class="group" data-od-id="group-${statusClass(s)}"><div class="group-head"><i class="dot ${statusClass(s)}"></i><h3>${s}</h3><span class="group-count">${items.length}</span></div><div class="cards">${items.map(card).join('')}</div></section>`}).join('');root.querySelectorAll('.event-card').forEach(el=>el.onclick=()=>show('赛事详情将在下一页面打开'))}
    function empty(){document.getElementById('resultCount').textContent='0 项';root.innerHTML='<div class="state-box"><div class="state-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4M8 11h6"/></svg></div><h3>没有找到符合条件的赛事</h3><p>可以更换赛区或状态筛选后再试</p><button class="state-action" id="clearFilters">清除筛选</button></div>';document.getElementById('clearFilters').onclick=()=>{region='全部';status='全部';persist();syncChips();normal()}}
    function persist(){localStorage.setItem('vtcc-tournaments-region',region);localStorage.setItem('vtcc-tournaments-status',status)}
    function syncChips(){document.querySelectorAll('#regionFilters .chip').forEach(x=>x.classList.toggle('active',x.dataset.value===region));document.querySelectorAll('#statusFilters .chip').forEach(x=>x.classList.toggle('active',x.dataset.value===status))}
    function bindFilters(id,type){document.querySelectorAll(`#${id} .chip`).forEach(btn=>btn.onclick=()=>{type==='region'?region=btn.dataset.value:status=btn.dataset.value;persist();syncChips();normal()})}
    function show(text){const el=document.getElementById('toast');el.textContent=text;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}
    let touchStart=0;document.addEventListener('touchstart',e=>{if(scrollY===0)touchStart=e.touches[0].clientY},{passive:true});document.addEventListener('touchend',e=>{if(touchStart&&e.changedTouches[0].clientY-touchStart>70){const ind=document.getElementById('refreshIndicator');ind.classList.add('show');setTimeout(()=>{ind.classList.remove('show');normal();show('已刷新赛事')},800)}touchStart=0},{passive:true});
    bindFilters('regionFilters','region');bindFilters('statusFilters','status');syncChips();normal();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>VTCC 首页</title>
  <style>
    :root{--bg:#f7f8fa;--surface:#fff;--fg:#1d2129;--muted:#4e5969;--subtle:#86909c;--border:#e5e6eb;--accent:#ff4655;--accent-soft:#fff0f1;--success:#00a870;--font-display:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--font-body:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--font-mono:"SFMono-Regular",Consolas,monospace;--r-sm:8px;--r-md:12px;--space:16px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:var(--font-body);font-size:14px}button,input{font:inherit}button{cursor:pointer}.app{width:100%;min-height:100vh;padding:0 16px 88px;overflow:hidden}.statusbar{height:24px;display:flex;align-items:end;justify-content:space-between;padding:0 4px 2px;font-size:11px;font-weight:650}.status-icons{letter-spacing:1px}.top{padding:10px 0 2px}.brand-row,.date-row,.section-head,.meta-row,.schedule-row,.nav{display:flex;align-items:center;justify-content:space-between}.brand{font-size:24px;line-height:1;font-weight:800;letter-spacing:-.04em}.mini-actions{display:flex;align-items:center;gap:8px}.icon-btn{width:44px;height:44px;border:0;background:transparent;border-radius:10px;display:grid;place-items:center;color:var(--fg)}.icon-btn:active{background:var(--border)}svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.date-row{margin-top:18px}.date{font-size:18px;font-weight:700}.weekday{margin-left:8px}.tagline{font-size:13px;color:var(--subtle);margin:4px 0 0}.search{height:46px;width:100%;margin-top:16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);display:flex;align-items:center;gap:10px;padding:0 14px;color:var(--subtle);box-shadow:0 2px 8px rgba(29,33,41,.025)}.search input{border:0;outline:0;width:100%;background:transparent;color:var(--fg);font-size:14px}.search:focus-within{border-color:var(--accent)}.search-result{display:none;margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--muted)}.search-result.show{display:block}.section{margin-top:20px}.section-head{height:28px}.section-head h2{font-size:18px;margin:0;font-weight:750}.more{border:0;background:transparent;color:var(--subtle);padding:10px 0 10px 12px}.matches{display:grid;gap:10px;margin-top:10px}.match{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(29,33,41,.035);transition:transform .15s,border-color .15s}.match:active{transform:scale(.99)}.meta-row{font-size:11px;color:var(--muted);gap:8px}.league{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:auto}.status{padding:3px 7px;border-radius:6px;background:var(--bg);color:var(--muted)}.status.live{background:var(--accent-soft);color:var(--accent);font-weight:650}.teams{display:grid;grid-template-columns:1fr 54px 1fr;align-items:center;margin-top:12px}.team{display:flex;align-items:center;gap:8px;min-width:0}.team.away{flex-direction:row-reverse;text-align:right}.logo{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--surface);background:var(--fg)}.logo.gold{background:color-mix(in oklch,var(--accent) 42%,var(--fg))}.logo.orange{background:color-mix(in oklch,var(--accent) 70%,yellow)}.logo.red{background:color-mix(in oklch,var(--accent) 84%,var(--fg))}.logo.blue{background:color-mix(in oklch,var(--fg) 62%,cyan)}.team-name{font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{text-align:center;font:bold 20px/1 var(--font-mono);letter-spacing:.06em}.score .hot{color:var(--accent)}.events{display:flex;gap:10px;margin:10px -16px 0;padding:0 16px 4px;overflow-x:auto;scrollbar-width:none}.events::-webkit-scrollbar{display:none}.event{flex:0 0 108px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:left}.event-mark{width:34px;height:34px;border-radius:9px;background:var(--bg);display:grid;place-items:center;font-weight:800;margin-bottom:10px}.event strong{font-size:13px;display:block;line-height:1.35}.event span{display:block;color:var(--accent);font-size:11px;margin-top:5px}.day-label{font-size:12px;color:var(--muted);margin:10px 0 7px}.schedule-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}.schedule-row{height:58px;padding:0 12px;border-bottom:1px solid var(--border)}.schedule-row:last-child{border-bottom:0}.schedule-meta{font-size:11px;color:var(--subtle);width:92px}.schedule-pair{display:flex;align-items:center;justify-content:flex-end;gap:9px;flex:1;font-weight:650}.mini-logo{width:24px;height:24px;border-radius:7px;background:var(--fg);color:var(--surface);display:grid;place-items:center;font-size:9px}.mini-logo.accent{background:var(--accent)}.mini-logo.gold{background:color-mix(in oklch,var(--accent) 42%,var(--fg))}.vs{font:12px var(--font-mono);color:var(--muted)}.bottom{position:fixed;left:0;right:0;bottom:0;height:72px;background:color-mix(in oklch,var(--surface) 98%,transparent);border-top:1px solid var(--border);z-index:10}.nav{height:100%;max-width:375px;margin:auto}.nav-btn{border:0;background:transparent;color:var(--subtle);width:25%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px}.nav-btn.active{color:var(--accent);font-weight:650}.nav-btn svg{width:22px;height:22px}.state-box{min-height:236px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-top:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}.state-icon{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;color:var(--subtle);background:var(--bg);margin-bottom:12px}.state-box h3{font-size:15px;margin:0}.state-box p{font-size:12px;color:var(--subtle);margin:7px 0 0;line-height:1.5}.retry{height:40px;border:1px solid var(--border);background:var(--surface);border-radius:9px;padding:0 22px;margin-top:15px;font-weight:650}.skeleton{width:100%;display:grid;gap:12px}.sk{height:14px;border-radius:5px;background:linear-gradient(90deg,var(--border) 25%,var(--surface) 45%,var(--border) 65%);background-size:220% 100%;animation:load 1.35s infinite}.sk.short{width:42%}.sk.card{height:70px}@keyframes load{to{background-position:-220% 0}}.toast{position:fixed;left:50%;bottom:86px;transform:translate(-50%,14px);background:var(--fg);color:var(--surface);border-radius:8px;padding:9px 14px;font-size:12px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(min-width:600px){.app{max-width:430px;margin:auto}.bottom .nav{max-width:430px}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
  <style>
    /* 比分数字以冒号为中心保持单行、等宽和对称。 */
    .score { min-width: 64px; white-space: nowrap; letter-spacing: 0; font-variant-numeric: tabular-nums; }
  </style>
  <style>
    /* 390×844 · iPhone 13 · 微信原生小程序安全区适配 */
    :root { --canvas-width: 390px; --safe-top: 47px; --safe-bottom: 34px; --tabbar-height: 49px; }
    html, body { width: 100%; min-height: 100%; }
    body { max-width: var(--canvas-width); margin-inline: auto; }
    .app {
      width: 100%;
      max-width: var(--canvas-width);
      min-height: 100svh;
      margin-inline: auto;
      padding: 0 16px calc(var(--tabbar-height) + var(--safe-bottom) + 16px);
    }
    .statusbar { height: var(--safe-top); padding: 0 4px 8px; }
    .top { padding: 8px 0 2px; }
    .bottom {
      height: calc(var(--tabbar-height) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
    }
    .nav { width: 100%; max-width: var(--canvas-width); height: var(--tabbar-height); }
    .toast { bottom: calc(var(--tabbar-height) + var(--safe-bottom) + 14px); }
    @supports (padding: env(safe-area-inset-bottom)) {
      .bottom { padding-bottom: max(var(--safe-bottom), env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div class="app" data-od-id="vtcc-home">
    <div class="statusbar"><span>9:41</span><span class="status-icons">▮▮▮ ))) ▰</span></div>
    <header class="top" data-od-id="home-header">
      <div class="brand-row"><div class="brand" data-od-id="brand-name">VTCC</div><div class="mini-actions"><button class="icon-btn" id="moreBtn" aria-label="更多操作" data-od-id="more-action"><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1" fill="currentColor" stroke="none"/></svg></button></div></div>
      <div class="date-row"><div><div class="date"><span id="dateText">6月10日</span><span class="weekday">星期二</span></div><p class="tagline">不错过每一场精彩对决</p></div><button class="icon-btn" id="calendarBtn" aria-label="选择日期" data-od-id="calendar-entry"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg></button></div>
      <label class="search" data-od-id="event-search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><input id="searchInput" type="search" placeholder="搜索赛事、战队或选手" aria-label="搜索赛事、战队或选手"></label><div class="search-result" id="searchResult">输入关键词后，将匹配赛事、战队或选手。</div>
    </header>
    <main>
      <section class="section" data-od-id="today-matches"><div class="section-head"><h2 data-od-id="today-title">今日比赛</h2><button class="more" data-od-id="today-all">全部 ›</button></div><div id="todayContent"></div></section>
      <section class="section" data-od-id="popular-events"><div class="section-head"><h2 data-od-id="popular-title">热门赛事</h2><button class="more" data-od-id="popular-all">全部 ›</button></div><div class="events"><button class="event" data-od-id="event-masters"><div class="event-mark">M</div><strong>VCT 大师赛<br>多伦多</strong><span>进行中</span></button><button class="event" data-od-id="event-pacific"><div class="event-mark">P</div><strong>VCT 太平洋<br>第二赛段</strong><span>进行中</span></button><button class="event" data-od-id="event-emea"><div class="event-mark">E</div><strong>VCT EMEA<br>第二赛段</strong><span>进行中</span></button><button class="event" data-od-id="event-china"><div class="event-mark">C</div><strong>VCT CN<br>第二赛段</strong><span>即将开始</span></button></div></section>
      <section class="section" data-od-id="upcoming-schedule"><div class="section-head"><h2 data-od-id="schedule-title">近期赛程</h2><button class="more" data-od-id="schedule-all">全部 ›</button></div><p class="day-label">6月11日 · 星期三</p><div class="schedule-list"><div class="schedule-row" data-od-id="schedule-edg-fpx"><div class="schedule-meta">VCT CN · 16:00</div><div class="schedule-pair"><span>EDG</span><span class="mini-logo">E</span><span class="vs">VS</span><span class="mini-logo accent">F</span><span>FPX</span></div></div><div class="schedule-row" data-od-id="schedule-drx-t1"><div class="schedule-meta">VCT Pacific · 18:00</div><div class="schedule-pair"><span>DRX</span><span class="mini-logo">D</span><span class="vs">VS</span><span class="mini-logo gold">T1</span><span>T1</span></div></div></div></section>
    </main>
  </div>
  <nav class="bottom" data-od-id="bottom-navigation"><div class="nav"><button class="nav-btn active" data-od-id="nav-home"><svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>首页</button><button class="nav-btn" data-od-id="nav-events"><svg viewBox="0 0 24 24"><path d="M8 4h8v3a4 4 0 0 1-8 0zM6 5H3v2a4 4 0 0 0 5 4M18 5h3v2a4 4 0 0 1-5 4M12 11v5M8 21h8M9 16h6v5H9z"/></svg>赛事</button><button class="nav-btn" id="favoriteBtn" data-od-id="nav-favorite"><svg viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2-5.6-3-5.6 3 1.1-6.2L3 9.6l6.2-.9z"/></svg>收藏</button><button class="nav-btn" data-od-id="nav-profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>我的</button></div></nav>
  <div class="toast" id="toast">已更新</div>
  <script>
    const params=new URLSearchParams(location.search);let state=params.get('state')||'normal';const box=document.getElementById('todayContent');
    const matches=`<div class="matches"><article class="match" data-od-id="match-gen-prx"><div class="meta-row"><span class="league">VCT 太平洋赛区</span><span>18:00</span><span>BO3</span><span class="status live">直播中</span></div><div class="teams"><div class="team"><span class="logo gold">GEN</span><span class="team-name">Gen.G</span></div><div class="score"><span class="hot">1</span> : 0</div><div class="team away"><span class="logo">PRX</span><span class="team-name">PRX</span></div></div></article><article class="match" data-od-id="match-fnc-th"><div class="meta-row"><span class="league">VCT EMEA</span><span>20:30</span><span>BO3</span><span class="status">未开始</span></div><div class="teams"><div class="team"><span class="logo orange">FNC</span><span class="team-name">FNC</span></div><div class="score">VS</div><div class="team away"><span class="logo">TH</span><span class="team-name">TH</span></div></div></article><article class="match" data-od-id="match-sen-100t"><div class="meta-row"><span class="league">VCT 美洲赛区</span><span>23:00</span><span>BO5</span><span class="status">未开始</span></div><div class="teams"><div class="team"><span class="logo red">SEN</span><span class="team-name">SEN</span></div><div class="score">VS</div><div class="team away"><span class="logo blue">100</span><span class="team-name">100T</span></div></div></article></div>`;
    function render(s){state=s;if(s==='loading')box.innerHTML='<div class="state-box"><div class="skeleton"><div class="sk short"></div><div class="sk card"></div><div class="sk card"></div></div><p>正在加载赛事数据</p></div>';else if(s==='empty')box.innerHTML='<div class="state-box"><div class="state-icon"><svg viewBox="0 0 24 24"><path d="M4 5h16v15H4zM8 3v4M16 3v4M4 10h16"/></svg></div><h3>今天暂无比赛</h3><p>可以先看看明天的近期赛程</p><button class="retry" id="viewSchedule">查看赛程</button></div>';else if(s==='error')box.innerHTML='<div class="state-box"><div class="state-icon"><svg viewBox="0 0 24 24"><path d="M12 3 2.5 20h19zM12 9v5M12 17h.01"/></svg></div><h3>加载失败</h3><p>网络似乎开了小差，请稍后重试</p><button class="retry" id="retryBtn">重试</button></div>';else box.innerHTML=matches;bindDynamic()}
    function bindDynamic(){document.querySelectorAll('.match').forEach(x=>x.onclick=()=>show('比赛详情将在后续页面提供'));document.getElementById('retryBtn')?.addEventListener('click',()=>{render('loading');setTimeout(()=>{render('normal');show('赛事数据已更新')},700)});document.getElementById('viewSchedule')?.addEventListener('click',()=>{window.scrollTo({top:document.querySelector('[data-od-id="upcoming-schedule"]').offsetTop-12,behavior:'smooth'})})}
    function show(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}
    render(state);document.getElementById('searchInput').addEventListener('focus',()=>document.getElementById('searchResult').classList.add('show'));document.getElementById('searchInput').addEventListener('input',e=>{document.getElementById('searchResult').textContent=e.target.value?`正在搜索“${e.target.value}”`:'输入关键词后，将匹配赛事、战队或选手。'});document.getElementById('searchInput').addEventListener('blur',()=>setTimeout(()=>document.getElementById('searchResult').classList.remove('show'),180));document.getElementById('calendarBtn').onclick=()=>show('日期选择器已打开');document.getElementById('moreBtn').onclick=()=>show('更多操作');document.getElementById('favoriteBtn').onclick=()=>show('已进入收藏');document.querySelectorAll('.event,.more').forEach(x=>x.onclick=()=>show('列表入口已响应'));
  </script>
</body>
</html>

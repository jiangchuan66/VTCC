<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>VTCC · 大师赛多伦多</title>
  <style>
    :root{--bg:#f7f8fa;--surface:#fff;--fg:#1d2129;--muted:#4e5969;--subtle:#86909c;--border:#e5e6eb;--accent:#ff4655;--accent-soft:#fff0f1;--upcoming:#3370ff;--upcoming-soft:#eef4ff;--font-display:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--font-body:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--font-mono:"SFMono-Regular",Consolas,monospace;--canvas:390px;--safe-top:47px;--safe-bottom:34px;--native-tabbar:49px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:var(--font-body);font-size:14px;-webkit-font-smoothing:antialiased}body{max-width:var(--canvas);margin-inline:auto}button{font:inherit;cursor:pointer}button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}svg{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.app{width:100%;max-width:var(--canvas);min-height:100svh;margin:auto;padding:0 16px calc(var(--native-tabbar) + var(--safe-bottom) + 18px);overflow-x:hidden}.statusbar{height:var(--safe-top);display:flex;align-items:end;justify-content:space-between;padding:0 4px 8px;font-size:11px;font-weight:650}.status-icons{letter-spacing:1px}.nav-bar{height:44px;display:flex;align-items:center;position:relative}.back{width:44px;height:44px;border:0;background:transparent;border-radius:10px;display:grid;place-items:center;color:var(--fg);margin-left:-10px}.back:active{background:var(--border)}.back svg{width:22px;height:22px}.nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:700}.capsule-space{margin-left:auto;width:94px;height:32px;border-radius:16px}.hero{margin-top:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(29,33,41,.035)}.hero-top{display:grid;grid-template-columns:56px 1fr 44px;gap:12px;align-items:start}.event-logo{width:56px;height:56px;border-radius:12px;background:var(--fg);color:var(--surface);display:grid;place-items:center;font-weight:800;font-size:15px}.event-heading{min-width:0}.event-heading h1{font:750 20px/1.25 var(--font-display);margin:0;letter-spacing:-.015em}.event-abbr{font:10px var(--font-mono);color:var(--subtle);margin-top:4px}.favorite{width:44px;height:44px;border:1px solid var(--border);background:var(--surface);border-radius:10px;display:grid;place-items:center;color:var(--muted)}.favorite svg{width:21px;height:21px}.favorite.active{color:var(--accent);background:var(--accent-soft);border-color:var(--accent-soft)}.favorite.active svg{fill:currentColor}.hero-meta{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-top:14px;font-size:11px;color:var(--muted)}.hero-meta .sep{width:2px;height:2px;border-radius:50%;background:var(--border)}.status{padding:3px 7px;border-radius:6px;font-size:10px}.status.live{background:var(--accent-soft);color:var(--accent);font-weight:650}.status.upcoming{background:var(--upcoming-soft);color:var(--upcoming);font-weight:650}.status.ended{background:var(--bg);color:var(--subtle)}.section{margin-top:20px}.section-head{height:28px;display:flex;align-items:center;justify-content:space-between}.section-head h2{font-size:18px;margin:0;font-weight:750}.overview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 12px}.stat-label{font-size:11px;color:var(--subtle)}.stat-value{font-size:15px;font-weight:700;margin-top:5px}.match-tabs{display:flex;gap:8px;margin:10px -16px 0;padding:0 16px 3px;overflow-x:auto;scrollbar-width:none}.match-tabs::-webkit-scrollbar,.teams-rail::-webkit-scrollbar{display:none}.tab{height:34px;padding:0 14px;border:0;border-radius:999px;background:var(--surface);color:var(--fg);box-shadow:inset 0 0 0 1px var(--border);font-size:13px;flex:0 0 auto}.tab.active{background:var(--accent);color:var(--surface);box-shadow:none;font-weight:650}.match-groups{margin-top:12px}.date-label{font-size:12px;color:var(--muted);margin:14px 0 8px}.matches{display:grid;gap:10px}.match{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(29,33,41,.035);text-align:left;color:var(--fg);transition:transform .15s}.match:active{transform:scale(.99)}.match-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}.round{margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.teams{display:grid;grid-template-columns:1fr 64px 1fr;align-items:center;margin-top:12px}.team{display:flex;align-items:center;gap:8px;min-width:0}.team.away{flex-direction:row-reverse;text-align:right}.team-logo{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--surface);background:var(--fg);flex:0 0 auto}.team-logo.prx{background:var(--fg)}.team-logo.fnc{background:color-mix(in oklch,var(--accent) 70%,yellow)}.team-logo.wol{background:color-mix(in oklch,var(--upcoming) 45%,var(--fg))}.team-logo.g2{background:color-mix(in oklch,var(--fg) 82%,var(--surface))}.team-name{font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{text-align:center;font:bold 20px/1 var(--font-mono);font-variant-numeric:tabular-nums;white-space:nowrap}.score-grid{display:grid;grid-template-columns:1ch .7ch 1ch;justify-content:center}.winner{color:var(--accent)}.teams-rail{display:flex;gap:10px;margin:10px -16px 0;padding:0 16px 4px;overflow-x:auto;scrollbar-width:none}.team-card{flex:0 0 96px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;color:var(--fg)}.team-card .team-logo{margin:0 auto;width:40px;height:40px}.team-card strong{display:block;font-size:12px;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.team-card span{display:block;font-size:10px;color:var(--subtle);margin-top:3px}.about{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:10px}.about p{margin:0;color:var(--muted);font-size:13px;line-height:1.65}.about-list{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:grid;gap:8px}.about-row{display:grid;grid-template-columns:64px 1fr;gap:10px;font-size:12px}.about-row span:first-child{color:var(--subtle)}.state-box{min-height:420px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-top:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px}.state-icon{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;color:var(--subtle);background:var(--bg);margin-bottom:13px}.state-icon svg{width:24px;height:24px}.state-box h3{font-size:16px;margin:0}.state-box p{font-size:12px;color:var(--subtle);margin:7px 0 0;line-height:1.55;max-width:22em}.state-action{height:40px;border:1px solid var(--border);background:var(--surface);border-radius:9px;padding:0 22px;margin-top:16px;font-weight:650;color:var(--fg)}.skeletons{width:100%;display:grid;gap:12px}.sk{height:16px;border-radius:5px;background:linear-gradient(90deg,var(--border) 25%,var(--surface) 45%,var(--border) 65%);background-size:220% 100%;animation:load 1.35s infinite}.sk.logo{width:56px;height:56px;border-radius:12px}.sk.wide{width:78%}.sk.card{height:96px;border-radius:12px}.refresh{position:fixed;top:calc(var(--safe-top) + 8px);left:50%;transform:translate(-50%,-64px);z-index:20;height:34px;padding:0 14px;border-radius:999px;background:var(--fg);color:var(--surface);display:flex;align-items:center;gap:7px;font-size:11px;transition:transform .2s}.refresh.show{transform:translate(-50%,0)}.spinner{width:12px;height:12px;border:2px solid color-mix(in oklch,var(--surface) 35%,transparent);border-top-color:var(--surface);border-radius:50%;animation:spin .8s linear infinite}.toast{position:fixed;left:50%;bottom:calc(var(--native-tabbar) + var(--safe-bottom) + 14px);transform:translate(-50%,14px);background:var(--fg);color:var(--surface);border-radius:8px;padding:9px 14px;font-size:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}@keyframes load{to{background-position:-220% 0}}@keyframes spin{to{transform:rotate(360deg)}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="refresh" id="refreshIndicator"><span class="spinner"></span>正在刷新赛事</div>
  <div class="app" data-od-id="tournament-detail-page">
    <div class="statusbar" data-od-id="status-bar"><span>9:41</span><span class="status-icons">▮▮▮ ))) ▰</span></div>
    <header class="nav-bar" data-od-id="custom-navigation"><button class="back" id="backBtn" aria-label="返回"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button><span class="nav-title">赛事详情</span><span class="capsule-space" aria-hidden="true"></span></header>
    <main id="contentRoot"></main>
  </div>
  <div class="toast" id="toast">已更新</div>
  <script>
    const state=new URLSearchParams(location.search).get('state')||'normal';const root=document.getElementById('contentRoot');let favorite=localStorage.getItem('vtcc-favorite-masters-toronto')==='true';let matchFilter='全部';
    const MATCHES=[
      {date:'6月22日',time:'15:00',round:'总决赛',bo:'BO5',status:'已结束',a:'FNATIC',al:'FNC',ac:'fnc',b:'Paper Rex',bl:'PRX',bc:'prx',as:1,bs:3},
      {date:'6月21日',time:'15:00',round:'败者组决赛',bo:'BO5',status:'已结束',a:'Wolves',al:'WOL',ac:'wol',b:'FNATIC',bl:'FNC',bc:'fnc',as:1,bs:3},
      {date:'6月20日',time:'15:00',round:'败者组半决赛',bo:'BO3',status:'已结束',a:'G2 Esports',al:'G2',ac:'g2',b:'FNATIC',bl:'FNC',bc:'fnc',as:0,bs:2},
      {date:'6月20日',time:'12:00',round:'胜者组决赛',bo:'BO3',status:'已结束',a:'Paper Rex',al:'PRX',ac:'prx',b:'Wolves',bl:'WOL',bc:'wol',as:2,bs:0}
    ];
    const TEAM_CARDS=[['G2','G2 Esports','美洲','g2'],['SEN','Sentinels','美洲',''],['MIBR','MIBR','美洲',''],['RRQ','Rex Regum Qeon','太平洋',''],['GEN','Gen.G','太平洋',''],['PRX','Paper Rex','太平洋','prx'],['FNC','FNATIC','EMEA','fnc'],['TH','Team Heretics','EMEA',''],['TL','Team Liquid','EMEA',''],['XLG','Xi Lai Gaming','中国',''],['BLG','Bilibili Gaming','中国',''],['WOL','Wolves Esports','中国','wol']];
    function score(a,b){return `<span class="score score-grid"><span class="${a>b?'winner':''}">${a}</span><span>:</span><span class="${b>a?'winner':''}">${b}</span></span>`}
    function matchCard(m,i){return `<button class="match" data-od-id="detail-match-${i}"><span class="match-meta"><span class="round">${m.round}</span><span>${m.time}</span><span>${m.bo}</span><span class="status ended">${m.status}</span></span><span class="teams"><span class="team"><span class="team-logo ${m.ac}">${m.al}</span><span class="team-name">${m.a}</span></span>${score(m.as,m.bs)}<span class="team away"><span class="team-logo ${m.bc}">${m.bl}</span><span class="team-name">${m.b}</span></span></span></button>`}
    function renderMatches(){const box=document.getElementById('matchList');if(!box)return;const list=matchFilter==='全部'||matchFilter==='已结束'?MATCHES:[];if(!list.length){box.innerHTML='<div class="state-box" style="min-height:220px"><div class="state-icon"><svg viewBox="0 0 24 24"><path d="M4 5h16v15H4zM8 3v4M16 3v4M4 10h16"/></svg></div><h3>暂无对应比赛</h3><p>切换到“全部”或“已结束”查看比赛记录</p></div>';return}let html='';[...new Set(list.map(x=>x.date))].forEach(d=>{html+=`<div class="date-label">${d}</div><div class="matches">${list.filter(x=>x.date===d).map(matchCard).join('')}</div>`});box.innerHTML=html;box.querySelectorAll('.match').forEach(x=>x.onclick=()=>show('比赛详情将在下一页面打开'))}
    function normal(){root.innerHTML=`<section class="hero" data-od-id="event-hero"><div class="hero-top"><div class="event-logo">M</div><div class="event-heading"><h1>VCT 大师赛·多伦多</h1><div class="event-abbr">MASTERS TORONTO · 2025</div></div><button class="favorite ${favorite?'active':''}" id="favoriteBtn" aria-label="收藏赛事"><svg viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2-5.6-3-5.6 3 1.1-6.2L3 9.6l6.2-.9z"/></svg></button></div><div class="hero-meta"><span>国际赛事</span><i class="sep"></i><span class="status ended">已结束</span><i class="sep"></i><span>淘汰赛 · 总决赛</span><i class="sep"></i><span>6月7日–6月22日</span></div></section><section class="section" data-od-id="overview-section"><div class="section-head"><h2>赛事概览</h2></div><div class="overview"><div class="stat"><div class="stat-label">赛区</div><div class="stat-value">国际</div></div><div class="stat"><div class="stat-label">当前阶段</div><div class="stat-value">总决赛</div></div><div class="stat"><div class="stat-label">参赛战队</div><div class="stat-value">12 支</div></div><div class="stat"><div class="stat-label">比赛数量</div><div class="stat-value">24 场</div></div></div></section><section class="section" data-od-id="matches-section"><div class="section-head"><h2>比赛</h2></div><div class="match-tabs" id="matchTabs"><button class="tab active" data-value="全部">全部</button><button class="tab" data-value="即将开始">即将开始</button><button class="tab" data-value="已结束">已结束</button></div><div class="match-groups" id="matchList"></div></section><section class="section" data-od-id="teams-section"><div class="section-head"><h2>参赛战队</h2><span style="font-size:11px;color:var(--subtle)">12 支</span></div><div class="teams-rail">${TEAM_CARDS.map((t,i)=>`<button class="team-card" data-od-id="participant-team-${i}"><span class="team-logo ${t[3]}">${t[0]}</span><strong>${t[1]}</strong><span>${t[2]}</span></button>`).join('')}</div></section><section class="section" data-od-id="about-section"><div class="section-head"><h2>赛事介绍</h2></div><div class="about"><p>VCT 大师赛·多伦多汇聚四大国际联赛的 12 支顶尖战队，是 2025 赛季第二项全球大师赛。赛事从瑞士轮进入双败淘汰赛，最终由 Paper Rex 夺得冠军。</p><div class="about-list"><div class="about-row"><span>赛制</span><span>瑞士轮 + 双败淘汰赛；总决赛 BO5</span></div><div class="about-row"><span>地点</span><span>加拿大 · 多伦多</span></div><div class="about-row"><span>时间</span><span>2025 年 6 月 7–22 日</span></div></div></div></section>`;bindNormal()}
    function bindNormal(){const fav=document.getElementById('favoriteBtn');fav.onclick=()=>{favorite=!favorite;localStorage.setItem('vtcc-favorite-masters-toronto',favorite);fav.classList.toggle('active',favorite);show(favorite?'已收藏赛事':'已取消收藏')};document.querySelectorAll('#matchTabs .tab').forEach(t=>t.onclick=()=>{matchFilter=t.dataset.value;document.querySelectorAll('#matchTabs .tab').forEach(x=>x.classList.toggle('active',x===t));renderMatches()});document.querySelectorAll('.team-card').forEach(x=>x.onclick=()=>show('战队详情将在下一页面打开'));renderMatches()}
    function loading(){root.innerHTML='<section class="hero"><div class="skeletons"><div class="sk logo"></div><div class="sk wide"></div><div class="sk"></div></div></section><section class="section"><div class="skeletons"><div class="sk card"></div><div class="sk card"></div><div class="sk card"></div></div><p style="text-align:center;color:var(--subtle);font-size:12px">正在加载赛事详情</p></section>'}
    function empty(){root.innerHTML='<section class="hero"><div class="hero-top"><div class="event-logo">M</div><div class="event-heading"><h1>VCT 大师赛·多伦多</h1><div class="event-abbr">MASTERS TORONTO · 2025</div></div></div><div class="hero-meta"><span>国际赛事</span><i class="sep"></i><span class="status ended">已结束</span></div></section><section class="section"><div class="section-head"><h2>比赛</h2></div><div class="state-box"><div class="state-icon"><svg viewBox="0 0 24 24"><path d="M4 5h16v15H4zM8 3v4M16 3v4M4 10h16"/></svg></div><h3>暂无比赛数据</h3><p>该赛事的比赛安排尚未同步，请稍后查看</p></div></section>'}
    function error(){root.innerHTML='<div class="state-box" style="margin-top:12px"><div class="state-icon"><svg viewBox="0 0 24 24"><path d="M12 3 2.5 20h19zM12 9v5M12 17h.01"/></svg></div><h3>赛事详情加载失败</h3><p>网络似乎开了小差，请稍后重试</p><button class="state-action" id="retryBtn">重试</button></div>';document.getElementById('retryBtn').onclick=()=>{loading();setTimeout(()=>{normal();show('赛事详情已更新')},700)}}
    function show(text){const el=document.getElementById('toast');el.textContent=text;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}
    document.getElementById('backBtn').onclick=()=>show('返回赛事列表');let touchStart=0;document.addEventListener('touchstart',e=>{if(scrollY===0)touchStart=e.touches[0].clientY},{passive:true});document.addEventListener('touchend',e=>{if(touchStart&&e.changedTouches[0].clientY-touchStart>70){const ind=document.getElementById('refreshIndicator');ind.classList.add('show');setTimeout(()=>{ind.classList.remove('show');state==='normal'&&normal();show('已刷新赛事详情')},800)}touchStart=0},{passive:true});state==='loading'?loading():state==='empty'?empty():state==='error'?error():normal();
  </script>
</body>
</html>
